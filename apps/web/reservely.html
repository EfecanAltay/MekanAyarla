<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mekan Ayarla — Flexible Reservation Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --surface3: #252535;
      --border: #2a2a3d;
      --border2: #363650;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --accent3: #38bdf8;
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #f87171;
      --text: #f0f0f8;
      --text2: #9090b0;
      --text3: #5a5a7a;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 20px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .font-display {
      font-family: 'Syne', sans-serif;
    }

    /* ───── LAYOUT ───── */
    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .main-layout {
      display: flex;
      flex: 1;
    }

    .content-area {
      flex: 1;
      overflow-y: auto;
    }

    /* ───── TOPBAR ───── */
    .topbar {
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .topbar-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      flex-shrink: 0;
    }

    .topbar-logo span {
      -webkit-text-fill-color: var(--text2);
      font-weight: 400;
      font-size: 0.8rem;
      display: block;
      letter-spacing: 0.05em;
    }

    .topbar-spacer {
      flex: 1;
    }

    .topbar-nav {
      display: flex;
      gap: 4px;
    }

    .topbar-nav button {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .topbar-nav button:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .topbar-nav button.active {
      color: var(--accent2);
      background: rgba(108, 99, 255, 0.12);
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      font-family: 'Syne', sans-serif;
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
    }

    /* ───── SIDEBAR ───── */
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .sidebar-section {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
      padding: 10px 10px 4px;
      margin-top: 4px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.875rem;
      color: var(--text2);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .sidebar-item:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .sidebar-item.active {
      background: rgba(108, 99, 255, 0.15);
      color: var(--accent2);
      font-weight: 500;
    }

    .sidebar-item svg {
      flex-shrink: 0;
      opacity: 0.7;
    }

    .sidebar-item.active svg {
      opacity: 1;
    }

    .sidebar-badge {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 20px;
      min-width: 18px;
      text-align: center;
    }

    /* ───── MOBILE DRAWER ───── */
    .mobile-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 200;
      backdrop-filter: blur(4px);
    }

    .mobile-drawer {
      display: none;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 201;
      padding: 20px 10px;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }

    .mobile-drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    /* ───── PAGE HEADER ───── */
    .page-header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .page-subtitle {
      color: var(--text2);
      font-size: 0.875rem;
      margin-top: 4px;
    }

    /* ───── SECTIONS ───── */
    .section {
      padding: 24px;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.01em;
    }

    /* ───── CARDS ───── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .stat-card:hover {
      border-color: var(--border2);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
    }

    .stat-card.purple::before {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .stat-card.blue::before {
      background: linear-gradient(90deg, var(--accent3), #60a5fa);
    }

    .stat-card.green::before {
      background: linear-gradient(90deg, var(--success), #6ee7b7);
    }

    .stat-card.amber::before {
      background: linear-gradient(90deg, var(--warning), #fcd34d);
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text3);
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .stat-change {
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat-change.up {
      color: var(--success);
    }

    .stat-change.down {
      color: var(--danger);
    }

    /* ───── RESOURCE CARDS ───── */
    .resource-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all 0.2s;
      cursor: pointer;
    }

    .resource-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(108, 99, 255, 0.15);
    }

    .resource-card-header {
      padding: 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .resource-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .resource-icon.lesson {
      background: rgba(108, 99, 255, 0.2);
    }

    .resource-icon.cafe {
      background: rgba(251, 191, 36, 0.15);
    }

    .resource-icon.desk {
      background: rgba(56, 189, 248, 0.15);
    }

    .resource-icon.room {
      background: rgba(52, 211, 153, 0.15);
    }

    .resource-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
    }

    .resource-type {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 4px;
      display: inline-block;
    }

    .resource-type.lesson {
      background: rgba(108, 99, 255, 0.2);
      color: var(--accent2);
    }

    .resource-type.cafe {
      background: rgba(251, 191, 36, 0.15);
      color: var(--warning);
    }

    .resource-type.desk {
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent3);
    }

    .resource-type.room {
      background: rgba(52, 211, 153, 0.15);
      color: var(--success);
    }

    .resource-card-body {
      padding: 0 20px 16px;
      font-size: 0.85rem;
      color: var(--text2);
      line-height: 1.5;
    }

    .resource-card-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
    }

    .capacity-bar {
      flex: 1;
      margin: 0 12px;
      height: 4px;
      background: var(--surface3);
      border-radius: 4px;
      overflow: hidden;
    }

    .capacity-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .capacity-fill.low {
      background: var(--success);
    }

    .capacity-fill.mid {
      background: var(--warning);
    }

    .capacity-fill.high {
      background: var(--danger);
    }

    /* ───── SLOT GRID ───── */
    .slot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    .slot-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    .slot-card:hover:not(.full):not(.closed) {
      border-color: var(--accent);
      background: rgba(108, 99, 255, 0.08);
    }

    .slot-card.selected {
      border-color: var(--accent);
      background: rgba(108, 99, 255, 0.18);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
    }

    .slot-card.full {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .slot-card.closed {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .slot-time {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .slot-avail {
      font-size: 0.7rem;
      color: var(--text2);
    }

    .slot-avail.low {
      color: var(--warning);
    }

    .slot-avail.full {
      color: var(--danger);
    }

    .slot-status {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 20px;
    }

    .slot-status.open {
      background: rgba(52, 211, 153, 0.15);
      color: var(--success);
    }

    .slot-status.full {
      background: rgba(248, 113, 113, 0.15);
      color: var(--danger);
    }

    .slot-status.waitlist {
      background: rgba(251, 191, 36, 0.15);
      color: var(--warning);
    }

    /* ───── TABLE ───── */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead {
      background: var(--surface2);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      white-space: nowrap;
    }

    td {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .td-name {
      font-weight: 500;
    }

    .td-sub {
      font-size: 0.78rem;
      color: var(--text2);
      margin-top: 2px;
    }

    /* ───── BADGE ───── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .badge.confirmed {
      background: rgba(52, 211, 153, 0.15);
      color: var(--success);
    }

    .badge.pending {
      background: rgba(251, 191, 36, 0.15);
      color: var(--warning);
    }

    .badge.cancelled {
      background: rgba(248, 113, 113, 0.15);
      color: var(--danger);
    }

    .badge.waitlist {
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent3);
    }

    .badge.active {
      background: rgba(52, 211, 153, 0.12);
      color: var(--success);
    }

    .badge.inactive {
      background: rgba(90, 90, 122, 0.2);
      color: var(--text3);
    }

    /* ───── BUTTONS ───── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #5b52e0);
      color: #fff;
      box-shadow: 0 4px 16px rgba(108, 99, 255, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4);
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--surface3);
      border-color: var(--border2);
    }

    .btn-ghost {
      background: none;
      color: var(--text2);
      padding: 9px 14px;
    }

    .btn-ghost:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .btn-danger {
      background: rgba(248, 113, 113, 0.15);
      color: var(--danger);
      border: 1px solid rgba(248, 113, 113, 0.2);
    }

    .btn-danger:hover {
      background: rgba(248, 113, 113, 0.25);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 0.8rem;
    }

    .btn-lg {
      padding: 13px 28px;
      font-size: 1rem;
    }

    /* ───── FORM ───── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text2);
    }

    .form-input,
    .form-select,
    .form-textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      width: 100%;
      transition: border-color 0.15s;
      outline: none;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
    }

    .form-input::placeholder {
      color: var(--text3);
    }

    .form-select {
      appearance: none;
      cursor: pointer;
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-hint {
      font-size: 0.75rem;
      color: var(--text3);
      margin-top: 2px;
    }

    .form-error {
      font-size: 0.75rem;
      color: var(--danger);
      margin-top: 2px;
    }

    /* ───── TABS ───── */
    .tabs {
      display: flex;
      gap: 2px;
      background: var(--surface2);
      padding: 4px;
      border-radius: var(--radius-sm);
      overflow-x: auto;
    }

    .tab-btn {
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      background: none;
      color: var(--text2);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      font-weight: 500;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
    }

    .tab-btn:hover:not(.active) {
      color: var(--text);
    }

    /* ───── CALENDAR STRIP ───── */
    .cal-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }

    .cal-day {
      flex-shrink: 0;
      width: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 6px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid var(--border);
      background: var(--surface2);
    }

    .cal-day:hover {
      border-color: var(--border2);
      background: var(--surface3);
    }

    .cal-day.selected {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(108, 99, 255, 0.4);
    }

    .cal-day.today:not(.selected) {
      border-color: var(--accent2);
    }

    .cal-dow {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .cal-date {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .cal-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--success);
    }

    .cal-day.selected .cal-dot {
      background: rgba(255, 255, 255, 0.7);
    }

    /* ───── BOOKING FLOW ───── */
    .booking-flow {
      max-width: 580px;
      margin: 0 auto;
    }

    .booking-step {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .step-num {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.875rem;
      flex-shrink: 0;
    }

    .step-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
    }

    .step-complete .step-num {
      background: var(--success);
    }

    /* ───── MODAL ───── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 300;
      display: flex;
      align-items: center;

    function getCapacityClass(booked, cap) {
      const pct = booked / cap;
      if (pct >= 1) return 'high';
      if (pct >= 0.6) return 'mid';
      return 'low';
    }
    function getCapacityPct(booked, cap) { return Math.round((booked / cap) * 100); }
    function typeIcon(type) {
      const map = { lesson: '📚', cafe: '☕', desk: '💻', room: '🏢' };
      return map[type] || '📦';
    }
    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    function formatDate(d) { return `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`; }

    function showToast(msg, type = 'success') {
      const icons_map = { success: '✓', error: '✕', info: 'ℹ' };
      const tc = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${type} fade-in`;
      t.innerHTML = `<span class="toast-icon" style="font-size:1rem">${icons_map[type]}</span><span>${msg}</span>`;
      tc.appendChild(t);
      setTimeout(() => t.remove(), 3200);
    }

      const rules = [
        { key: 'max_per_day', label: 'Max bookings per user/day', desc: 'Prevent users from making more than N bookings in a day', value: '3', type: 'number', on: true },
        { key: 'approval', label: 'Require approval', desc: 'Reservations need admin confirmation before being confirmed', type: 'toggle', on: false },
        { key: 'waitlist', label: 'Enable waitlist', desc: 'When capacity is full, allow users to join a waitlist', type: 'toggle', on: true },
        { key: 'cutoff', label: 'Reservation cutoff', desc: 'How far in advance must a booking be made (hours)', value: '2', type: 'number', on: true },
        { key: 'cancel_deadline', label: 'Cancellation deadline', desc: 'Users can cancel up to N hours before the slot', value: '24', type: 'number', on: true },
        { key: 'duplicate', label: 'Prevent duplicate bookings', desc: 'Prevent the same user from booking the same slot twice', type: 'toggle', on: true },
        { key: 'guest_limit', label: 'Guest limit per booking', desc: 'Maximum number of guests/seats per reservation', value: '6', type: 'number', on: true },
      ];
      return `
  <div class="fade-in">
    <div class="page-header">
      <div><div class="page-title">Booking Rules</div>
      <div class="page-subtitle">Configure policies and constraints for your resources</div></div>
      <button class="btn btn-primary" onclick="showToast('Rules saved successfully!')">Save changes</button>
    </div>
    <div class="section">
      <div class="card">
        <div class="section-title">Policy Configuration</div>
        ${rules.map(r => `
        <div class="rule-row">
          <div style="flex:1">
            <div class="rule-label">${r.label}</div>
            <div class="rule-desc">${r.desc}</div>
          </div>
          ${r.type === 'toggle' ? `
          <div class="toggle ${r.on ? 'on' : ''}" onclick="this.classList.toggle('on');showToast('Policy updated')"></div>` : `
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <div class="toggle ${r.on ? 'on' : ''}" onclick="this.classList.toggle('on')"></div>
            <input type="number" class="form-input" value="${r.value}" style="width:72px;text-align:center">
          </div>`}
        </div>`).join('')}
      </div>
    </div>
  </div>`;
    }

    // ─── SETTINGS ─────────────────────────────────
    function renderSettings() {
      return `
  <div class="fade-in">
    <div class="page-header">
      <div><div class="page-title">Settings</div>
      <div class="page-subtitle">Manage your organization and platform settings</div></div>
    </div>
    <div class="section">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div class="card">
          <div class="section-title">Organization</div>
          <div style="display:flex;flex-direction:column;gap:14px">
            <div class="form-group">
              <label class="form-label">Organization name</label>
              <input class="form-input" value="Mekan Ayarla ? Demo Org">
            </div>
            <div class="form-group">
              <label class="form-label">Business type</label>
              <select class="form-select"><option>Education</option><option>Café / Restaurant</option><option>Coworking</option><option>Service</option><option>Other</option></select>
            </div>
            <div class="form-group">
              <label class="form-label">Timezone</label>
              <select class="form-select"><option>Europe/Istanbul (GMT+3)</option><option>UTC</option><option>America/New_York</option></select>
            </div>
            <button class="btn btn-primary" onclick="showToast('Settings saved')">Save</button>
          </div>
        </div>
        <div class="card">
          <div class="section-title">Notifications</div>
          <div style="display:flex;flex-direction:column;gap:0">
            ${[
          ['Email on new booking', 'Send email when someone makes a reservation', true],
          ['SMS reminders', 'Send SMS reminder 24h before slot', false],
          ['Waitlist promotions', 'Notify when someone joins or is promoted from waitlist', true],
          ['Cancellation alerts', 'Alert admin when a booking is cancelled', true],
        ].map(([l, d, on]) => `
            <div class="rule-row">
              <div style="flex:1"><div class="rule-label">${l}</div><div class="rule-desc">${d}</div></div>
              <div class="toggle ${on ? 'on' : ''}" onclick="this.classList.toggle('on')"></div>
            </div>`).join('')}
          </div>
        </div>
      </div>
    </div>
  </div>`;
    }

    // ─── PROFILE ──────────────────────────────────
    function renderProfile() {
      return `
  <div class="fade-in">
    <div class="page-header">
      <div><div class="page-title">Profile</div>
      <div class="page-subtitle">Manage your account</div></div>
    </div>
    <div class="section">
      <div class="card" style="max-width:480px;margin:0 auto">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
          <div class="avatar" style="width:64px;height:64px;font-size:1.4rem">${store.user?.name?.charAt(0) || '?'}</div>
          <div>
            <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1.15rem">${store.user?.name || 'Guest'}</div>
            <div style="color:var(--text2);font-size:0.875rem">${store.user?.email || ''}</div>
            <span class="badge confirmed mt-1">${store.user?.role || 'customer'}</span>
          </div>
        </div>
        <div class="divider"></div>
        <div style="display:flex;flex-direction:column;gap:14px;margin-top:16px">
          <div class="form-group">
            <label class="form-label">Full name</label>
            <input class="form-input" value="${store.user?.name || ''}">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" value="${store.user?.email || ''}">
          </div>
          <div class="form-group">
            <label class="form-label">Phone number</label>
            <input class="form-input" placeholder="+90 555 000 0000">
          </div>
          <button class="btn btn-primary" onclick="showToast('Profile updated')">Save changes</button>
          <button class="btn btn-danger" onclick="nav('landing')">Sign out</button>
        </div>
      </div>
    </div>
  </div>`;
    }

    // ─── MODAL ────────────────────────────────────
    function renderModal() {
      if (store.showModal === 'newResource') return `
  <div class="modal-overlay" onclick="if(event.target===this){store.showModal=null;render()}">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Add new resource</div>
        <button class="close-btn" onclick="store.showModal=null;render()">${icons.x}</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group">
          <label class="form-label">Resource name</label>
          <input class="form-input" placeholder="e.g. Table #5, Python Beginners, Desk A3">
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Type</label>
            <select class="form-select">
              <option>lesson</option><option>cafe</option><option>desk</option><option>room</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Capacity</label>
            <input class="form-input" type="number" value="6" min="1">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Branch / Location</label>
          <input class="form-input" placeholder="Main Campus">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" placeholder="Brief description of this resource…"></textarea>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-secondary w-full" style="justify-content:center" onclick="store.showModal=null;render()">Cancel</button>
          <button class="btn btn-primary w-full" style="justify-content:center" onclick="store.showModal=null;showToast('Resource created successfully!');render()">
            ${icons.plus} Create resource
          </button>
        </div>
      </div>
    </div>
  </div>`;

      if (store.showModal === 'newSlot') return `
  <div class="modal-overlay" onclick="if(event.target===this){store.showModal=null;render()}">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Create time slot</div>
        <button class="close-btn" onclick="store.showModal=null;render()">${icons.x}</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group">
          <label class="form-label">Resource</label>
          <select class="form-select">
            ${store.resources.map(r => `<option>${r.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Start time</label>
            <input class="form-input" type="time" value="09:00">
          </div>
          <div class="form-group">
            <label class="form-label">End time</label>
            <input class="form-input" type="time" value="10:00">
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Capacity override</label>
            <input class="form-input" type="number" placeholder="Use resource default">
          </div>
          <div class="form-group">
            <label class="form-label">Repeat</label>
            <select class="form-select">
              <option>No repeat</option>
              <option>Daily</option>
              <option>Weekdays</option>
              <option>Weekly</option>
            </select>
          </div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-secondary w-full" style="justify-content:center" onclick="store.showModal=null;render()">Cancel</button>
          <button class="btn btn-primary w-full" style="justify-content:center" onclick="store.showModal=null;showToast('Slot created!');render()">
            ${icons.plus} Create slot
          </button>
        </div>
      </div>
    </div>
  </div>`;

      return '';
    }

    // ─── INTERACTIONS ─────────────────────────────
    function nav(view) { store.currentView = view; store.mobileDrawerOpen = false; render(); window.scrollTo(0, 0); }
    function closeDrawer() { store.mobileDrawerOpen = false; render(); }
    function openBooking(resourceId) { store.bookingResourceId = resourceId; store.bookingStep = 1; store.selectedSlot = null; nav('booking'); }
    function selectDate(ts) { store.selectedDate = new Date(ts); render(); }
    function selectSlot(id) { store.selectedSlot = id; render(); }
    function confirmBooking() {
      store.bookingStep = 1; store.selectedSlot = null;
      nav('my-bookings');
      showToast('Reservation confirmed! 🎉');
    }
    function confirmRes(id) {
      const r = store.reservations.find(r => r.id === id);
      if (r) { r.status = 'confirmed'; render(); showToast('Reservation confirmed'); }
    }
    function cancelRes(id) {
      const r = store.reservations.find(r => r.id === id);
      if (r) { r.status = 'cancelled'; render(); showToast('Reservation cancelled', 'info'); }
    }
    function filterResources(q) {
      const grid = document.getElementById('resourceGrid');
      if (!grid) return;
      const lq = q.toLowerCase();
      const filtered = q ? store.resources.filter(r => r.name.toLowerCase().includes(lq) || r.type.includes(lq) || r.branch.toLowerCase().includes(lq)) : store.resources;
      grid.innerHTML = renderResourceCards(filtered);
    }
    function filterByType(type) {
      document.querySelectorAll('[data-filter]').forEach(b => {
        b.classList.remove('btn-primary'); b.classList.add('btn-secondary');
        if (b.dataset.filter === type) { b.classList.add('btn-primary'); b.classList.remove('btn-secondary'); }
      });
      const grid = document.getElementById('resourceGrid');
      if (!grid) return;
      const filtered = type === 'all' ? store.resources : store.resources.filter(r => r.type === type);
      grid.innerHTML = renderResourceCards(filtered);
    }

    function bindAll() {
      const menuBtn = document.getElementById('menuBtn');
      if (menuBtn) menuBtn.addEventListener('click', () => { store.mobileDrawerOpen = !store.mobileDrawerOpen; render(); });
    }

    // ─── INIT ─────────────────────────────────────
    render();
  </script>
</body>

</html>
