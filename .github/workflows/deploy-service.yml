name: Deploy App Service

on:
  workflow_call:
    inputs:
      SERVER_HOST:
        type: string
        required: true
      SERVER_USER:
        type: string
        required: true
      service_name:
        type: string
        required: true
      version:
        type: string
        required: true
      CLIENT_URL:
        type: string
        required: true
    secrets:
      THEFOODHEROAPI_SECRET:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      DATABASE_URL:
        required: true


jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v3

      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.THEFOODHEROAPI_SECRET }}

      - name: 📤 Copy docker-compose.yml
        run: |
          ssh -o StrictHostKeyChecking=no ${{ inputs.SERVER_USER }}@${{ inputs.SERVER_HOST }} "mkdir -p /app/mekanayarla"
          scp -o StrictHostKeyChecking=no docker-compose.yml ${{ inputs.SERVER_USER }}@${{ inputs.SERVER_HOST }}:/app/mekanayarla/docker-compose.yml

      - name: 🚀 Deploy Service
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLIENT_URL: ${{ inputs.CLIENT_URL }}
          SERVICE: ${{ inputs.service_name }}
          TAG: ${{ inputs.version }}
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ inputs.SERVER_USER }}@${{ inputs.SERVER_HOST }} \
          "DOCKER_USER='$DOCKER_USER' DOCKER_PASS='$DOCKER_PASS' DATABASE_URL='$DATABASE_URL' CLIENT_URL='$CLIENT_URL' SERVICE='$SERVICE' TAG='$TAG' bash -s" << 'EOF'
            set -e

            cd /app/mekanayarla

            SERVER_IMAGE="$DOCKER_USER/mekanayarla-server"
            WEB_IMAGE="$DOCKER_USER/mekanayarla-web"
            IMAGE_TAG="$TAG"

            echo "🚀 Deploying $SERVICE"
            echo "📦 Server image: $SERVER_IMAGE:$IMAGE_TAG"
            echo "📦 Web image: $WEB_IMAGE:$IMAGE_TAG"

            echo "$DOCKER_PASS" | docker login --username "$DOCKER_USER" --password-stdin

            echo "🌐 Ensuring network exists: mekanayarla_net"
            docker network inspect mekanayarla_net >/dev/null 2>&1 || docker network create mekanayarla_net

            echo "🧹 Pre-deploy cleanup for $SERVICE..."
            if [ "$SERVICE" = "server" ]; then
              docker image rm -f "$SERVER_IMAGE:$IMAGE_TAG" || true
            elif [ "$SERVICE" = "web" ]; then
              docker image rm -f "$WEB_IMAGE:$IMAGE_TAG" || true
            fi

            echo "📥 Pulling latest image for $SERVICE..."
            SERVER_IMAGE="$SERVER_IMAGE" \
            WEB_IMAGE="$WEB_IMAGE" \
            IMAGE_TAG="$IMAGE_TAG" \
            DATABASE_URL="$DATABASE_URL" \
            CLIENT_URL="$CLIENT_URL" \
            docker compose pull "$SERVICE"

            echo "♻️ Recreating $SERVICE container..."
            SERVER_IMAGE="$SERVER_IMAGE" \
            WEB_IMAGE="$WEB_IMAGE" \
            IMAGE_TAG="$IMAGE_TAG" \
            DATABASE_URL="$DATABASE_URL" \
            CLIENT_URL="$CLIENT_URL" \
            docker compose up -d --force-recreate --no-deps "$SERVICE"

            echo "🧹 Keeping last 2 images for $SERVICE..."
            if [ "$SERVICE" = "server" ]; then
              TARGET_REPOSITORY="$SERVER_IMAGE"
            elif [ "$SERVICE" = "web" ]; then
              TARGET_REPOSITORY="$WEB_IMAGE"
            else
              echo "❌ Unknown service: $SERVICE"
              exit 1
            fi

            docker images "$TARGET_REPOSITORY" \
              --format "{{.Repository}}:{{.Tag}} {{.ID}}" | \
              grep -v ":latest " | \
              awk '{print $2}' | \
              tail -n +3 | \
              xargs -r docker rmi || true

            docker logout
          EOF