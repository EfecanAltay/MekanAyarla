name: Deploy App Service

on:
  workflow_call:
    inputs:
      SERVER_HOST:
        type: string
        required: true
      SERVER_USER:
        type: string
        required: true
      service_name:
        type: string
        required: true
    secrets:
      THEFOODHEROAPI_SECRET:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.THEFOODHEROAPI_SECRET }}

      - name: 🚀 Deploy Service
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ inputs.SERVER_USER }}@${{ inputs.SERVER_HOST }} << EOF

            set -e

            cd /app/mekanayarla

            SERVICE="${{ inputs.service_name }}"
            IMAGE_TAG="${{ github.sha }}"
            DOCKER_USER="${{ secrets.DOCKERHUB_USERNAME }}"

            export DOCKER_REPOSITORY="\$DOCKER_USER/mekanayarla-\$SERVICE"
            export IMAGE_TAG

            echo "🚀 Deploying \$SERVICE"
            echo "📦 Image: \$DOCKER_REPOSITORY:\$IMAGE_TAG"

            echo "\${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username "\$DOCKER_USER" --password-stdin

            echo "🌐 Ensuring network exists: mekanayarla_net"
            docker network inspect mekanayarla_net >/dev/null 2>&1 || docker network create mekanayarla_net

            echo "🧹 Pre-deploy cleanup for \$SERVICE..."
            docker image rm -f "\$DOCKER_REPOSITORY:\$IMAGE_TAG" || true

            # Update docker-compose file image or use environment variables
            # Assuming docker-compose.yml uses image: ${DOCKER_REPOSITORY}:${IMAGE_TAG}
            DOCKER_REPOSITORY=\$DOCKER_REPOSITORY IMAGE_TAG=\$IMAGE_TAG docker compose pull "\$SERVICE"
            DOCKER_REPOSITORY=\$DOCKER_REPOSITORY IMAGE_TAG=\$IMAGE_TAG docker compose up -d --force-recreate "\$SERVICE"

            echo "🧹 Keeping last 2 images for \$SERVICE..."
            docker images "\$DOCKER_REPOSITORY" \
              --format "{{.ID}} {{.CreatedAt}}" | \
              sort -r | tail -n +3 | awk '{print \$1}' | xargs -r docker rmi || true

          EOF