name: Deploy App Service

on:
  workflow_call:
    inputs:
      SERVER_HOST:
        type: string
        required: true
      SERVER_USER:
        type: string
        required: true
      aws_region:
        type: string
        required: true
      service_name:
        type: string
        required: true
    secrets:
      THEFOODHEROAPI_SECRET:
        required: true
      AWS_ACCOUNT_ID:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.THEFOODHEROAPI_SECRET }}

      - name: 🚀 Deploy Service
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ inputs.SERVER_USER }}@${{ inputs.SERVER_HOST }} << EOF

            set -e

            cd /app/mekanayarla

            REGION="${{ inputs.aws_region }}"
            ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
            SERVICE="${{ inputs.service_name }}"
            IMAGE_TAG="${{ github.sha }}"

            export ECR_REGISTRY="\$ACCOUNT_ID.dkr.ecr.\$REGION.amazonaws.com"
            export ECR_REPOSITORY="mekanayarla/\$SERVICE"
            export IMAGE_TAG

            echo "🚀 Deploying \$SERVICE"
            echo "📦 Image: \$ECR_REGISTRY/\$ECR_REPOSITORY:\$IMAGE_TAG"

            aws ecr get-login-password --region "\$REGION" | \
            docker login --username AWS --password-stdin "\$ECR_REGISTRY"

            echo "🌐 Ensuring network exists: mekanayarla_net"
            docker network inspect mekanayarla_net >/dev/null 2>&1 || docker network create mekanayarla_net

            echo "🧹 Pre-deploy cleanup for \$SERVICE..."
            docker image rm -f "\$ECR_REGISTRY/\$ECR_REPOSITORY:\$IMAGE_TAG" || true

            docker compose pull "\$SERVICE"
            docker compose up -d --force-recreate "\$SERVICE"

            echo "🧹 Keeping last 2 images for \$SERVICE..."
            docker images "\$ECR_REGISTRY/\$ECR_REPOSITORY" \
              --format "{{.ID}} {{.CreatedAt}}" | \
              sort -r | tail -n +3 | awk '{print \$1}' | xargs -r docker rmi || true

          EOF