name: Build & Push App Service

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      version:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set vars
        run: |
          echo "SERVICE_NAME=${{ inputs.service_name }}" >> $GITHUB_ENV
          echo "DOCKER_REPOSITORY=${{ secrets.DOCKERHUB_USERNAME }}/mekanayarla-${{ inputs.service_name }}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          echo "IMAGE_VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "NODE_ENV_VALUE=production" >> $GITHUB_ENV
          else
            echo "NODE_ENV_VALUE=test" >> $GITHUB_ENV
          fi

      - name: Build Docker image
        run: |
          docker build \
            --build-arg SERVICE_NAME=${SERVICE_NAME} \
            --build-arg APP_ENV=${NODE_ENV_VALUE} \
            -f apps/${SERVICE_NAME}/Dockerfile \
            -t ${SERVICE_NAME} \
            .

      - name: Tag & Push Docker image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test')
        run: |
          # Tag with Commit SHA (for exact traceability)
          docker tag ${SERVICE_NAME}:latest ${DOCKER_REPOSITORY}:${IMAGE_TAG}
          
          # Tag with Semantic Version (for easy tracking v1, v2...)
          docker tag ${SERVICE_NAME}:latest ${DOCKER_REPOSITORY}:${IMAGE_VERSION}
          
          # Tag with latest (for current prod)
          docker tag ${SERVICE_NAME}:latest ${DOCKER_REPOSITORY}:latest

          # Push all tags
          docker push ${DOCKER_REPOSITORY}:${IMAGE_TAG}
          docker push ${DOCKER_REPOSITORY}:${IMAGE_VERSION}
          docker push ${DOCKER_REPOSITORY}:latest
