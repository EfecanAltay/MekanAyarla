name: Build & Push App Service

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      aws_region:
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_ACCOUNT_ID:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test')
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set vars
        run: |
          echo "SERVICE_NAME=${{ inputs.service_name }}" >> $GITHUB_ENV
          echo "ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com" >> $GITHUB_ENV
          echo "ECR_REPOSITORY=mekanayarla/${{ inputs.service_name }}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "NODE_ENV_VALUE=production" >> $GITHUB_ENV
          else
            echo "NODE_ENV_VALUE=test" >> $GITHUB_ENV
          fi

      - name: Build Docker image
        run: |
          docker build \
            --build-arg SERVICE_NAME=${SERVICE_NAME} \
            --build-arg APP_ENV=${NODE_ENV_VALUE} \
            -f apps/${SERVICE_NAME}/Dockerfile \
            -t ${SERVICE_NAME} \
            .

      - name: Tag Docker image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test')
        run: |
          docker tag ${SERVICE_NAME}:latest \
            ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}

      - name: Push Docker image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test')
        run: |
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
